{% extends "base.html" %}
{% block title %}– Sign In{% endblock %}
{% block extra_style %}
<style>
.login-wrap { display: flex; flex-direction: column; align-items: center;
  justify-content: center; min-height: 90vh; padding: 40px 20px; }
.login-title { font-size: 2.8rem; font-weight: 800; letter-spacing: -1px;
  text-align: center; line-height: 1.1; margin-bottom: 8px; }
.login-title span { color: var(--accent); }
.login-sub { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 40px; text-align: center; }
.login-card { background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 28px; width: 100%; max-width: 360px; }
{% endblock %}
{% block content %}
<div class="login-wrap">
  <div class="login-title">Time<span>Track</span></div>
  <p class="login-sub">Employee time tracking</p>
  <div class="login-card">
    {% if error %}<div class="error-msg">{{ error }}</div>{% endif %}
    <form method="POST">
      <label>Your Name</label>
      <input type="text" name="name" placeholder="e.g. John Smith" autocomplete="off" required>
      <label>PIN</label>
      <input type="password" name="pin" placeholder="••••" maxlength="4" inputmode="numeric" required>
      <button type="submit" class="btn btn-primary">Sign In →</button>
    </form>
    <a href="/register"><button class="btn btn-outline" style="margin-top:10px;">New employee? Register</button></a>
  </div>
</div>
{% endblock %}
</style>
